<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta - Druza Semi Joias</title>
  <meta name="description" content="Crie sua conta Druza Semi Joias para acompanhar pedidos e agilizar suas compras." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="img/druza-logo.png" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteudo</a>
  <header class="site-header"><div class="container site-header__inner">
    <a class="logo" href="index.html" aria-label="Druza Semi Joias - pagina inicial">
      <svg class="logo__seal" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
        <circle cx="24" cy="24" r="23" fill="var(--rose)" />
        <g transform="translate(24,33) scale(0.42)" fill="#FFFFFF">
          <path transform="rotate(-52)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path transform="rotate(-26)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path d="M0,0 C -9,-16 -6,-44 0,-54 C 6,-44 9,-16 0,0 Z" />
          <path transform="rotate(26)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path transform="rotate(52)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
        </g>
      </svg>
      <span class="logo__word">
        <span class="logo__name">Druza</span>
        <span class="logo__sub">Semi Joias · Prata</span>
      </span>
    </a>
  </div></header>
  <main id="main" class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card__head">
        <span class="eyebrow">Sua conta</span>
        <h1>Criar conta</h1>
        <p>Acompanhe pedidos, salve endereços e agilize suas compras.</p>
      </div>
      <form class="auth-form" id="signup-form" novalidate>
        <label class="field">
          <span>Nome completo</span>
          <input type="text" name="fullName" autocomplete="name" required />
        </label>
        <label class="field">
          <span>E-mail</span>
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span>Telefone (opcional)</span>
          <input type="tel" name="phone" autocomplete="tel" inputmode="tel" />
        </label>
        <label class="field">
          <span>Senha</span>
          <span class="pw-wrap">
            <input type="password" name="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="pw-toggle" data-pw-toggle aria-label="Mostrar senha">ver</button>
          </span>
          <span class="field__hint">Mínimo de 8 caracteres.</span>
        </label>
        <label class="field field--check">
          <input type="checkbox" name="marketingConsent" />
          <span>Quero receber novidades e promoções da Druza por e-mail. (opcional)</span>
        </label>
        <label class="field field--check">
          <input type="checkbox" name="terms" required />
          <span>Li e concordo com a <a href="privacidade.html" target="_blank" rel="noopener">Política de Privacidade</a>.</span>
        </label>
        <p class="auth-feedback" id="feedback" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn btn--primary" id="submit-btn">Criar conta</button>
      </form>
      <div class="auth-alt">
        <span>Já tem conta? <a href="login.html">Entrar</a></span>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js" integrity="sha384-dGnL7r9uccC9TdSdE05clTJ6esxMU42XBQ1/BWLzKQOBi7qR1aCMRIi0LzUmexIg" crossorigin="anonymous"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const form = document.getElementById('signup-form');
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('submit-btn');

      document.querySelectorAll('[data-pw-toggle]').forEach(function (t) {
        t.addEventListener('click', function () {
          const input = t.previousElementSibling;
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          t.textContent = show ? 'ocultar' : 'ver';
          t.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
        });
      });

      window.DruzaAuth.getSession().then(function (s) { if (s) location.replace('conta.html'); });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        fb.className = 'auth-feedback'; fb.textContent = '';
        const fd = new FormData(form);
        const fullName = (fd.get('fullName') || '').trim();
        const email = (fd.get('email') || '').trim();
        const phone = (fd.get('phone') || '').trim();
        const password = fd.get('password') || '';
        const marketingConsent = fd.get('marketingConsent') === 'on';
        const terms = fd.get('terms') === 'on';

        if (!fullName || !email || !password) { fb.classList.add('is-error'); fb.textContent = 'Preencha nome, e-mail e senha.'; return; }
        if (password.length < 8) { fb.classList.add('is-error'); fb.textContent = 'A senha precisa ter no mínimo 8 caracteres.'; return; }
        if (!terms) { fb.classList.add('is-error'); fb.textContent = 'É necessário aceitar a Política de Privacidade.'; return; }

        btn.disabled = true; btn.textContent = 'Criando…';
        const { data, error } = await window.DruzaAuth.signUp({ fullName, email, phone, password, marketingConsent });
        if (error) {
          fb.classList.add('is-error'); fb.textContent = error;
          btn.disabled = false; btn.textContent = 'Criar conta';
          return;
        }
        // Supabase, com confirmação de e-mail ligada, NÃO cria sessão até confirmar.
        fb.classList.add('is-success');
        fb.textContent = 'Conta criada! Enviamos um e-mail de confirmação. Verifique sua caixa de entrada para ativar e entrar.';
        form.reset();
        btn.disabled = false; btn.textContent = 'Criar conta';
      });
    })();
  </script>
</body>
</html>
