<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha - Druza Semi Joias</title>
  <meta name="description" content="Recupere o acesso à sua conta Druza Semi Joias." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="img/druza-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteudo</a>
  <header class="site-header"><div class="container site-header__inner">
    <a class="logo" href="index.html" aria-label="Druza Semi Joias - pagina inicial">
      <svg class="logo__seal" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
        <circle cx="24" cy="24" r="23" fill="var(--rose)" />
        <g transform="translate(24,33) scale(0.42)" fill="#FFFFFF">
          <path transform="rotate(-52)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path transform="rotate(-26)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path d="M0,0 C -9,-16 -6,-44 0,-54 C 6,-44 9,-16 0,0 Z" />
          <path transform="rotate(26)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
          <path transform="rotate(52)" d="M0,0 C -9,-16 -6,-38 0,-48 C 6,-38 9,-16 0,0 Z" />
        </g>
      </svg>
      <span class="logo__word">
        <span class="logo__name">Druza</span>
        <span class="logo__sub">Semi Joias · Prata</span>
      </span>
    </a>
  </div></header>
  <main id="main" class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card__head">
        <span class="eyebrow">Sua conta</span>
        <h1>Recuperar senha</h1>
        <p>Informe seu e-mail. Enviaremos um link seguro para você criar uma nova senha.</p>
      </div>
      <form class="auth-form" id="reset-form" novalidate>
        <label class="field">
          <span>E-mail</span>
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <p class="auth-feedback" id="feedback" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn btn--primary" id="submit-btn">Enviar link</button>
      </form>
      <div class="auth-alt">
        <a href="login.html">Voltar para entrar</a>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const form = document.getElementById('reset-form');
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('submit-btn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        fb.className = 'auth-feedback'; fb.textContent = '';
        const email = (new FormData(form).get('email') || '').trim();
        if (!email) { fb.classList.add('is-error'); fb.textContent = 'Informe seu e-mail.'; return; }
        btn.disabled = true; btn.textContent = 'Enviando…';
        const { error } = await window.DruzaAuth.requestPasswordReset(email);
        // Por segurança, mostramos sucesso mesmo se o e-mail não existir (evita enumeração de contas).
        fb.classList.add('is-success');
        fb.textContent = 'Se houver uma conta com esse e-mail, enviamos um link para redefinir a senha. Verifique sua caixa de entrada.';
        if (error && !String(error).includes('rate')) { /* erros reais de config aparecem no console */ console.warn(error); }
        btn.disabled = false; btn.textContent = 'Enviar link';
      });
    })();
  </script>
</body>
</html>
